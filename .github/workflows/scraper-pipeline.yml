name: Automated Job Scraper Pipeline

on:
  schedule:
    # Runs 3 times a day (every 8 hours: 00:00, 08:00, 16:00 UTC)
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions UI

jobs:
  run-data-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install seleniumbase

      - name: Run Indeed/Apify Scraper
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/apify_jobs.py
        continue-on-error: true

      - name: Run Instahyre Scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/instahyre_jobs.py
        continue-on-error: true

      - name: Run Unstop Scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/unstop_jobs.py
        continue-on-error: true

      - name: Run SerpApi (Greenhouse/Lever) Scraper
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/serpapi_jobs.py
        continue-on-error: true

      - name: Run Foundit Scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/foundit.py
        continue-on-error: true

      - name: Run Wellfound Scraper (Organic SerpApi)
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scrapers/wellfound_jobs.py
        continue-on-error: true


      - name: Run AI Refinery Pipeline (Groq)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python web/scripts/refinery.py

      - name: Trigger SkillHire distribution
        run: |
          curl -X POST https://n8n.skillhire.in/webhook/job-distribution

